# Single source of truth for plugin / library versions across the Gradle
# tree. Referenced from both `build.gradle.kts` (root) and
# `app/build.gradle.kts` via the auto-generated `libs.*` accessor.

[versions]
# Tooling
agp = "8.5.2"
kotlin = "2.0.20"
ksp = "2.0.20-1.0.25"

# AndroidX
core-ktx = "1.13.1"
appcompat = "1.7.0"
activity-compose = "1.9.2"
lifecycle = "2.8.6"
navigation-compose = "2.8.2"
security-crypto = "1.1.0-alpha06"
datastore-preferences = "1.1.1"

# Compose
compose-bom = "2024.09.02"
compose-material3 = "1.3.0"

# Coroutines
coroutines = "1.9.0"

# UniFFI runtime — JNA is what the generated bindings link against on
# Android (vs JNI codegen on Linux desktop). Pin to a release that ships
# arm64-v8a + armeabi-v7a + x86_64 native shims, otherwise startup dies
# in `Native.register` on first FFI call.
jna = "5.15.0"

# JSON (kotlinx-serialization) — only used for cache-side helpers like
# decoding `data_json` blobs out of `CheckoutResponse`. The wire layer is
# already JSON-decoded inside Rust.
kotlinx-serialization = "1.7.3"

[libraries]
# Core / lifecycle / activity
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "core-ktx" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "appcompat" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activity-compose" }
androidx-lifecycle-runtime-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-ktx = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-compose = { module = "androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "lifecycle" }
androidx-lifecycle-runtime-compose = { module = "androidx.lifecycle:lifecycle-runtime-compose", version.ref = "lifecycle" }

# Compose (BOM + material3 + tooling)
androidx-compose-bom = { module = "androidx.compose:compose-bom", version.ref = "compose-bom" }
androidx-compose-ui = { module = "androidx.compose.ui:ui" }
androidx-compose-ui-graphics = { module = "androidx.compose.ui:ui-graphics" }
androidx-compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
androidx-compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling" }
androidx-compose-foundation = { module = "androidx.compose.foundation:foundation" }
androidx-compose-material3 = { module = "androidx.compose.material3:material3", version.ref = "compose-material3" }
androidx-compose-material-icons-extended = { module = "androidx.compose.material:material-icons-extended" }
androidx-navigation-compose = { module = "androidx.navigation:navigation-compose", version.ref = "navigation-compose" }

# Persistence
androidx-security-crypto = { module = "androidx.security:security-crypto-ktx", version.ref = "security-crypto" }
androidx-datastore-preferences = { module = "androidx.datastore:datastore-preferences", version.ref = "datastore-preferences" }

# Coroutines
kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }

# UniFFI runtime
jna = { module = "net.java.dev.jna", version.ref = "jna" }

# Serialization
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }

[plugins]
androidApplication = { id = "com.android.application", version.ref = "agp" }
kotlinAndroid = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlinComposeCompiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinSerialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
