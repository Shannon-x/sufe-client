org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# AndroidX always-on. `nonTransitiveRClass` keeps each module's R class
# scoped to its own resources, dramatically faster incremental builds for
# large modular projects (xboard-client is small but no harm).
android.useAndroidX=true
android.nonTransitiveRClass=true
android.enableJetifier=false

# Compose compiler 2.0+ stops emitting buildconfig defaults — opt back in
# when we need BuildConfig (e.g. release-only telemetry switches).
android.defaults.buildfeatures.buildconfig=true

kotlin.code.style=official
